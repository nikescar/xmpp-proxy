name: Build and Release

on:
  push:
    tags:
      - v*
    branches:
      - test
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (leave empty for all targets)'
        required: false
        type: choice
        options:
          - all
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-gnu
          - i686-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - arm-unknown-linux-gnueabi
          - arm-unknown-linux-gnueabihf
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-musleabihf
          - x86_64-linux-android
          - i686-linux-android
          - aarch64-linux-android
          - armv7-linux-androideabi
          - arm-linux-androideabi
          - x86_64-pc-windows-gnu
        default: 'all'

env:
  RUST_VERSION: nightly
  BIN_NAME: "xmpp-proxy"

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os || 'ubuntu-22.04' }}
    strategy:
      matrix:
        platform:
          # Linux x86_64
          - name: Linux x86_64 GNU
            target: x86_64-unknown-linux-gnu
            build-args: "--release"

          - name: Linux x86_64 musl
            target: x86_64-unknown-linux-musl
            build-args: "--release"

          # Linux i686/i586 - NOTE: 32-bit platforms require --no-default-features to disable QUIC (fastbloom AtomicU64 issue)
          - name: Linux i686 GNU
            target: i686-unknown-linux-gnu
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          - name: Linux i686 musl
            target: i686-unknown-linux-musl
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          # Linux aarch64
          - name: Linux aarch64 GNU
            target: aarch64-unknown-linux-gnu
            build-args: "--release"

          - name: Linux aarch64 musl
            target: aarch64-unknown-linux-musl
            build-args: "--release"

          # Linux armv7
          - name: Linux armv7 GNUhf
            target: armv7-unknown-linux-gnueabihf
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          - name: Linux armv7 muslhf
            target: armv7-unknown-linux-musleabihf
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          # Linux arm
          - name: Linux arm GNUeabi
            target: arm-unknown-linux-gnueabi
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          - name: Linux arm GNUhf
            target: arm-unknown-linux-gnueabihf
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          - name: Linux arm musleabi
            target: arm-unknown-linux-musleabi
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          - name: Linux arm muslhf
            target: arm-unknown-linux-musleabihf
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,systemd,tls-ring"

          # Android - 32-bit Android builds also need QUIC disabled
          - name: Android x86_64
            target: x86_64-linux-android
            build-args: "--release"

          - name: Android i686
            target: i686-linux-android
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,tls-ring"

          - name: Android aarch64
            target: aarch64-linux-android
            build-args: "--release"

          - name: Android armv7
            target: armv7-linux-androideabi
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,tls-ring"

          - name: Android arm
            target: arm-linux-androideabi
            build-args: "--release --no-default-features --features c2s-incoming,c2s-outgoing,s2s-incoming,s2s-outgoing,tls,websocket,logging,tls-ca-roots-native,tls-ring"

          # Windows
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-gnu
            build-args: "--release"

    steps:
      - name: Check if should build this target
        id: should_build
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || \
             [[ "${{ inputs.target || 'all' }}" == "all" ]] || \
             [[ "${{ inputs.target }}" == "${{ matrix.platform.target }}" ]]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi
      - name: Linux - Install Build Dependencies
        if: steps.should_build.outputs.build == 'true' && contains(matrix.platform.target, 'linux') && !contains(matrix.platform.target, 'android')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Android - Install Build Dependencies
        if: steps.should_build.outputs.build == 'true' && contains(matrix.platform.target, 'android')
        run: |
          sudo apt-get update
          sudo apt-get install -y android-libunwind android-libunwind-dev libunwind-dev musl-tools llvm-14 clang llvm

      - name: Checkout Repository
        if: steps.should_build.outputs.build == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update Version from Git Tag
        if: steps.should_build.outputs.build == 'true'
        shell: bash
        run: |
          # Extract version from git tag (remove 'v' prefix if present)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "Detected version: $VERSION"
            # Update version in Cargo.toml (compatible with both GNU and BSD sed)
            sed -i.bak "s/^version = .*/version = \"$VERSION\"/" ./Cargo.toml && rm -f ./Cargo.toml.bak
            echo "Updated Cargo.toml with version $VERSION"
            grep "^version = " ./Cargo.toml
          else
            echo "Not a tag build, skipping version update"
            VERSION=$(git describe --tags --always --dirty)
            echo "Build version: $VERSION"
          fi

      - name: Install Rust Toolchain
        if: steps.should_build.outputs.build == 'true'
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install cross for cross-compilation
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os != 'windows-latest'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary (cross) - Linux/Android
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os != 'windows-latest'
        run: |
          cross +nightly build ${{ matrix.platform.build-args }} --target ${{ matrix.platform.target }}

      - name: Build Binary (cargo) - Windows
        if: steps.should_build.outputs.build == 'true' && matrix.platform.os == 'windows-latest'
        run: |
          cargo +nightly build ${{ matrix.platform.build-args }} --target ${{ matrix.platform.target }}

      - name: Upload Binary Artifact
        if: steps.should_build.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: xmpp-proxy-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/release/xmpp-proxy${{ contains(matrix.platform.target, 'windows') && '.exe' || '' }}
          retention-days: 1

  release:
    name: Release
    needs: [build]
    if: startsWith( github.ref, 'refs/tags/v' )
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Artifacts
        run: |
          mkdir -p distbin/

          # Copy all binaries to distbin with proper naming
          for dir in artifacts/xmpp-proxy-*; do
            if [ -d "$dir" ]; then
              target=$(basename "$dir" | sed 's/^xmpp-proxy-//')
              if [ -f "$dir/xmpp-proxy.exe" ]; then
                cp "$dir/xmpp-proxy.exe" "distbin/xmpp-proxy-${target}.exe"
              elif [ -f "$dir/xmpp-proxy" ]; then
                cp "$dir/xmpp-proxy" "distbin/xmpp-proxy-${target}"
                chmod +x "distbin/xmpp-proxy-${target}"
              fi
            fi
          done

          # Copy config file
          cp xmpp-proxy.toml distbin/

      - name: Generate Checksums
        run: |
          cd distbin
          sha256sum xmpp-proxy-* xmpp-proxy.toml > sha256sum.txt
          cat sha256sum.txt

      - name: Sign Checksums with GPG
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd distbin
          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Sign the checksums file
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --armor --detach-sign sha256sum.txt
          # Verify signature was created
          ls -la sha256sum.txt.asc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          make_latest: true
          files: distbin/*
          body: |
            ## Release ${{ github.ref_name }}

            ### Downloads
            Download the binary for your platform from the assets below.

            ### Checksums
            All binaries have been checksummed. See `sha256sum.txt` for verification.
            The checksums file is GPG-signed (see `sha256sum.txt.asc`).

            ### Verification
            ```bash
            # Verify checksum
            sha256sum -c sha256sum.txt

            # Verify GPG signature (if GPG key is available)
            gpg --verify sha256sum.txt.asc sha256sum.txt
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
